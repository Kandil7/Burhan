version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: athar-postgres
    environment:
      POSTGRES_DB: athar_db
      POSTGRES_USER: athar
      POSTGRES_PASSWORD: athar_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U athar -d athar_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - athar-network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: athar-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - athar-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: athar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - athar-network

  # FastAPI Backend
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: athar-api
    ports:
      - "8000:8000"
    volumes:
      - ../src:/app/src
      - ../tests:/app/tests
    environment:
      DATABASE_URL: postgresql+asyncpg://athar:athar_password@postgres:5432/athar_db
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - athar-network

  # Next.js Frontend (Phase 1: skeleton)
  frontend:
    image: node:20-alpine
    container_name: athar-frontend
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    command: sh -c "npm install && npm run dev"
    depends_on:
      - api
    networks:
      - athar-network
    profiles:
      - frontend  # Optional: run with `docker compose --profile frontend up`

volumes:
  postgres_data:
  qdrant_data:
  redis_data:

networks:
  athar-network:
    driver: bridge
